  <div class="site-shell">
    
<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="index.html">
      <span class="brand-name">Sophia Dawson</span>
      <span class="brand-sub">Creative Artist</span>

    <button class="menu-toggle" aria-label="Toggle menu">Menu</button>

    <main>
<section class="section"><div class="container">
<div class="photo-layout">
  <div>
    <h1 class="section-title">Photography</h1>
    <p class="section-lead">Filter by all photos, portraits, landscape, or nature. No gold overlays on the image areas.</p>
    <div class="gallery-controls" data-filter-group data-target=".photo-collage > .photo-item">
      <button class="filter-chip active" data-filter="all">All Photos</button>
      <button class="filter-chip" data-filter="portraits">Portraits</button>
      <button class="filter-chip" data-filter="landscape">Landscape</button>
      <button class="filter-chip" data-filter="nature">Nature</button>
    </div>
  </div>
  <div class="photo-feature">
    <img src="assets/images/photography-feature-01.jpg" alt="Featured photography">
  </div>
</div>
<div class="photo-collage">
  <img class="photo-item" data-category="portraits" src="assets/images/photography-grid-01.jpg" alt="Photography image 1">
  <img class="photo-item" data-category="landscape" src="assets/images/photography-grid-02.jpg" alt="Photography image 2">
  <img class="photo-item" data-category="nature" src="assets/images/photography-grid-03.jpg" alt="Photography image 3">
  <img class="photo-item" data-category="portraits" src="assets/images/photography-grid-04.jpg" alt="Photography image 4">
  <img class="photo-item" data-category="landscape" src="assets/images/photography-grid-05.jpg" alt="Photography image 5">
  <img class="photo-item" data-category="nature" src="assets/images/photography-grid-06.jpg" alt="Photography image 6">
</div>
</div></section>
</main>
    
<footer class="site-footer">
  <div class="container footer-inner">
    <div>
      <div class="footer-name">Sophia Dawson</div>
      <div class="footer-sub">Creative Artist</div>

  </div>
</footer>
